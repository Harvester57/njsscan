name: Tests and Semgrep
on:
  push:
    branches: [ master ]
    paths-ignore:
      - Dockerfile
  pull_request:
    branches: [ master ]
    paths-ignore:
      - Dockerfile

env:
  SEMGREP_R2C_INTERNAL_EXPLICIT_SEMGREPIGNORE: ./tests/assets/.semgrepignore

permissions:
  contents: read # access to check out code and install dependencies

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11', '3.12', '3.13', '3.14' ]

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: ${{ matrix.python-version }}
        pip-install: tox semgrep tox-extra

    - name: Lint
      run: |
        tox -e lint

    - name: Bandit
      run: |
        tox -e bandit

    - name: Semgrep validate rules
      run: |
        semgrep --validate --strict --config=./njsscan/rules/semantic_grep/

    - name: Semgrep tests
      run: |
        semgrep --quiet --test --config ./njsscan/rules/semantic_grep ./tests/assets/node_source/true_positives/semantic_grep/

    - name: Run tests
      run: |
        tox -e ${{ matrix.python-version }}

    - name: Clean Up
      run: |
        tox -e clean
